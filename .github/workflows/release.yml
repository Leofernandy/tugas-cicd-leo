name: Release

on:
  push:
    tags:
      - "release*"

jobs:
  build:
    name: Build Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pipenv and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pipenv
          pipenv install

      - name: Create tarball
        run: tar -czf "../tugas-cicd-leo.tar.gz" . 

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ../tugas-cicd-leo.tar.gz